name: "Save Build Caches"
description: "Save LTO cache and ccache (both to GH Release) after a build"

inputs:
  build-system:
    required: true
  enable-lto:
    required: true
  lto-asset-name:
    description: "Release asset filename for the LTO cache (only needed when enable-lto is THIN)"
    required: false
  ccache-prefix:
    required: true
  gh-token:
    required: true

runs:
  using: composite
  steps:
    - name: "Save LTO Cache"
      if: startsWith(inputs.build-system, 'Make') && inputs.enable-lto == 'THIN'
      uses: ./.github/actions/save-lto-cache
      with:
        asset-name: ${{ inputs.lto-asset-name }}
        gh-token:   ${{ inputs.gh-token }}

    - name: "Save ccache"
      if: always() && startsWith(inputs.build-system, 'Make')
      uses: ./.github/actions/save-caches
      with:
        ccache-prefix: ${{ inputs.ccache-prefix }}
        gh-token:      ${{ inputs.gh-token }}

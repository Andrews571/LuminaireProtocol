name: "Setup GPG Signing"
description: "Import GPG key and configure git commit signing"

inputs:
  gpg-private-key:
    description: "GPG private key (armored)"
    required: true

runs:
  using: "composite"
  steps:
    - name: "Import GPG key and configure git"
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg-private-key }}
      run: |
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        git config --global user.signingkey D01D47B74C4CD13A
        git config --global commit.gpgsign true
        git config --global user.name "chainonyourdoor"
        git config --global user.email "chainonyourdoor@gmail.com"

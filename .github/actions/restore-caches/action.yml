name: "Restore Caches"
description: "Restore arsenal from GH Cache, ccache from Release"

inputs:
  arsenal-key:
    required: true
  ccache-key:
    required: true
  ccache-restore-keys:
    required: true
  gh-token:
    required: true

runs:
  using: composite
  steps:
    - name: "♻️ Restore arsenal"
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/clang-cache
          ~/ccache-bin
          ~/ak3-cache
          ~/kernel-cache
          ~/.apt-cache
        key: ${{ inputs.arsenal-key }}
        restore-keys: arsenal-${{ github.ref_name }}-

    - name: "♻️ Restore ccache from Release"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        ASSET_NAME="${{ inputs.ccache-restore-keys }}ccache.tar.zst"
        cd "${{ github.workspace }}"
        gh release download cache \
          --repo "${{ github.repository }}" \
          --pattern "${ASSET_NAME}" \
          --dir /tmp/ 2>/dev/null || true
        if [ -f "/tmp/${ASSET_NAME}" ]; then
          tar --zstd -xf "/tmp/${ASSET_NAME}"
          rm -f "/tmp/${ASSET_NAME}"
        fi

name: "✨ Luminaire Protocol"

on:
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  # ======================================================
  # 📦 PREP — Download tools, save arsenal cache
  # ======================================================
  prep:
    name: "📦 Prep Arsenal"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PERSONAL_TOKEN:   ${{ secrets.PERSONAL_TOKEN }}
      PREP_MODE:        "true"

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" \
            .

      - name: "♻️ Restore arsenal cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
          key: arsenal-${{ github.ref_name }}

      - name: "📦 Run Prep"
        run: bash build.sh

      - name: "💾 Save arsenal cache"
        uses: actions/cache/save@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
          key: arsenal-${{ github.ref_name }}

  # ======================================================
  # 🏗️ BUILD — Restore arsenal, build kernel
  # ======================================================
  build:
    name: "✨ Build Luminaire Protocol"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: prep

    env:
      PERSONAL_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_BUILD: ${{ secrets.TELEGRAM_THREAD_ID_BUILD }}
      TELEGRAM_THREAD_ID_LOG:   ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
      USE_KERNEL_CACHE:         "true"
      USE_AK3_CACHE:            "true"
      CCACHE_DIR:               ${{ github.workspace }}/.ccache

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" \
            .

      - name: "♻️ Restore arsenal cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
          key: arsenal-${{ github.ref_name }}

      - name: "♻️ Restore ccache"
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: ccache-${{ github.ref_name }}-

      - name: "♻️ Restore kernel source"
        uses: actions/cache/restore@v5
        with:
          path: ~/kernel-cache
          key: kernel-src-${{ github.ref_name }}

      - name: "✨ Build"
        run: bash build.sh

      - name: "💾 Save ccache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}

      - name: "💾 Save kernel source"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/kernel-cache
          key: kernel-src-${{ github.ref_name }}

      - name: "🧹 Cleanup old caches"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          cleanup_cache() {
            local PREFIX="$1"
            local CURRENT_KEY="$2"
            local CACHES
            CACHES=$(gh api \
              "/repos/${{ github.repository }}/actions/caches?per_page=100" \
              --jq ".actions_caches[] | select(.key | startswith(\"${PREFIX}\")) | select(.key != \"${CURRENT_KEY}\") | .id")
            if [ -n "$CACHES" ]; then
              for ID in $CACHES; do
                gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
              done
            fi
          fi
          cleanup_cache "ccache-${{ github.ref_name }}-" "ccache-${{ github.ref_name }}-${{ github.run_id }}"
          cleanup_cache "kernel-src-${{ github.ref_name }}" "kernel-src-${{ github.ref_name }}"
